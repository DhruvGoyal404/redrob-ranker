name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy rank-bm25 pytest

      - name: Compile all sources
        run: python -m py_compile rank.py precompute.py src/*.py eval/*.py

      - name: Run tests (traps, metrics, features, end-to-end pipeline smoke)
        run: python -m pytest -q
