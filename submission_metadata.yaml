# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/DhruvGoyal404/redrob-ranker"
sandbox_link: "https://redrob-rankers-indiaruns.streamlit.app/"

reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"

# ============================================================================
# Compute environment (ranking step)
# ============================================================================
compute:
  platform: "Windows 11, 12-core CPU (ranking); offline embeddings on an A100 GPU"
  cpu_cores: 12
  ram_gb: 16
  python_version: "3.13"
  os: "Windows 11"
  uses_gpu_for_inference: false       # ranking is CPU-only (GPU used ONLY for offline embedding precompute)
  has_network_during_ranking: false   # no API calls during ranking
  pre_computation_required: true      # embeddings built offline by precompute.py
  pre_computation_time_minutes: 4     # bge-small over 100K profiles on one A100 (~3 min)

# ============================================================================
# AI tools declaration (honest - not penalized)
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Claude Code) for architecture discussion, code review, and
  pair-programming the pipeline. All design decisions, scoring weights, trap
  heuristics and evaluation were authored and verified by the team against the
  real dataset. No candidate data was sent to any hosted LLM, and no LLM is
  called at ranking time (the constraint forbids it).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Evidence-based ranker, not a keyword matcher. Pipeline: (1) a validity gate
  detects honeypots (internal-consistency rules) and keyword-stuffers
  (non-technical title + AI skills with no corroborating work evidence) and
  drives them to the bottom; (2) hybrid retrieval (BM25 + bge-small dense
  vectors fused with Reciprocal Rank Fusion) builds a high-recall shortlist;
  (3) a transparent 7-component weighted scorer rewards demonstrated
  retrieval/ranking/applied-ML evidence from career history - not skill-name
  presence - then applies multiplicative modifiers for availability
  (recruiter response, recency, open-to-work), location, and the JD's explicit
  disqualifiers (services-only, off-domain, title-hopping). Embeddings are
  precomputed offline; the ranking step is CPU-only, no-network, and runs well
  within 5 minutes. Reasoning is assembled from real profile facts with a
  confidence tag and honest concerns. We also ship a four-fifths fairness audit.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true           # we explicitly detect + exclude honeypots
  reproduction_tested: true
